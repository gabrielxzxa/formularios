    <h1>Cadastro de Musica</h1>
    
    <form name="form1" onsubmit="return processarform()" method="post">
        <label>Nome da musica:</label>
        <input name="nmusica" type="text">

        <label>autor:</label>
        <input name="autor" type="text">

        <label>duração:</label>
        <input name="duracao" type="text">

        <label>estilo de musica</label>
        <select name="estmusica">
            <option value="">Selecione o estilo da musica</option>
            <option>Rock</option>
            <option>Gospel</option>
           <option>Funk</option>
            <option>Jazz</option>
            <option>Reggae</option>
            <option>MPB(Musica Popular Brasileira)</option>
            <option>Eletrônica</option>
           <option>Pop</option>
            <option>Hip Hop/Rap</option>
            <option>Blues</option>
        </select> 

        <label>Album:</label>
        <input name="album" type="text">

        
        <label>Cantor:</label>
        <input name="cantor" type="text" placeholder="Digite o nome do cantor">

         <label>Banda:</label>
        <input name="banda" type="text">

        Obs: <textarea name="acessorios"  cols="47" rows="8" placeholder="Alguma observação/duvida? digite aqui"></textarea>
        
        <input name="enviar" type="submit" value="Enviar">
        <input name="resetar" type="reset" value="Resetar">

    </form>
