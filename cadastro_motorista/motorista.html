    <h1>Cadastro de motorista</h1>
    
    <form name="form1" onsubmit="return processarform()" method="post">

        <label>Nome:</label>
        <input name="nome" type="text">

        <label>endereço</label>
        <input name="endereco" type="text">

        <label>Cor do seu carro:</label>
        <select name="cor">
            <option value="">Escolha a cor do seu carro</option>
            <option>Preto</option>
            <option>Branco</option>
           <option>Roxo</option>
            <option>amarelo</option>
            <option>Azul</option>
        </select> 

        <label>placa:</label>
        <input name="placa" type="text">

        <label>CPF:</label>
        <input name="cpf" type="text" maxlength="11" placeholder="Somente números" inputmode="numeric">

        <label>cnh</label>
        <select name="cnh">
          <option value="">Selecione</option>
            <option value="A">Categoria A</option>
            <option value="B">Categoria B</option>
           <option value="C">Categoria C</option>
            <option value="D">Categoria D</option>
            <option value="E">Categoria E</option>
        </select>

        <label>nome do carro</label>
        <input name="ncarro" type="text">

        Acessorios: <textarea name="acessorios"  cols="47" rows="8" placeholder="Digite os Acessorios do seu carro"></textarea>
        
        <input name="enviar" type="submit" value="Enviar">
        <input name="resetar" type="reset" value="Resetar">

    </form>
